openapi: 3.0.0
info:
  title: Personnel Assessment API
  version: 1.0.0
  description: API for the Personnel Assessment System

servers:
  - url: http://localhost:9999

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [ADMIN, EVALUATOR, EVALUATEE]
        departmentId:
          type: integer
        createdAt:
          type: string
          format: date-time

    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [ADMIN, EVALUATOR, EVALUATEE]
        departmentId:
          type: integer

paths:

  ######################
  # AUTH
  ######################

  /api/auth/login:
    post:
      tags: [Auth]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login

  /api/auth/register:
    post:
      tags: [Auth]
      summary: User registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get my profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  ######################
  # ADMIN
  ######################

  /api/admin/users:
    get:
      tags: [Admin]
      summary: Get all users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /api/admin/users/{id}:
    get:
      tags: [Admin]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    delete:
      tags: [Admin]
      summary: Delete user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted successfully

  ######################
  # FULL CRUD (Requirement)
  ######################

  /api/admin/crud/departments:
    post:
      tags: [CRUD]
      summary: Create department
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Department'
      responses:
        '201':
          description: Created

    get:
      tags: [CRUD]
      summary: Get all departments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success

  ######################
  # EVALUATEE
  ######################

  /api/me/assignments:
    get:
      tags: [Evaluatee]
      summary: Get my assignments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success

  ######################
  # EVALUATOR
  ######################

  /api/evaluator/assignments:
    get:
      tags: [Evaluator]
      summary: Get assignments to evaluate
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success

  ######################
  # REPORTS
  ######################

  /api/reports/summary:
    get:
      tags: [Reports]
      summary: Get summary report
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success